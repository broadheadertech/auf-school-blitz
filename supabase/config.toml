# Supabase Configuration for UniPortal
# See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Magic link expiry: 15 minutes (900 seconds) per NFR8
[auth.email.template.magic_link]
subject = "UniPortal Login Link"

[storage]
enabled = true

[realtime]
enabled = true
